name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - transfer_reports_to_xlsm.py
      - extract_report_csv.py
      - .github/workflows/build-windows-exe.yml

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller openpyxl

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --clean --onefile --name afhd_report_tool transfer_reports_to_xlsm.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: afhd_report_tool-windows-x64
          path: dist/afhd_report_tool.exe
          if-no-files-found: error
          retention-days: 30
